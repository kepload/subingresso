<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Messaggi — Subingresso.it</title>
    <link rel="stylesheet" href="css/tailwind.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        #messagesContainer {
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .msg-bubble-mine  { background: #2563eb; color: white; border-radius: 18px 18px 4px 18px; }
        .msg-bubble-other { background: white; color: #0f172a; border-radius: 18px 18px 18px 4px; border: 1px solid #f1f5f9; }
        .conv-thumb, .chat-thumb { background:#f1f5f9; }
        .conv-thumb img, .chat-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
        .typing-dots { display:inline-flex; gap:3px; align-items:center; }
        .typing-dots span {
            width:5px; height:5px; border-radius:50%;
            background:#94a3b8; display:inline-block;
            animation: typingPulse 1.2s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: .15s; }
        .typing-dots span:nth-child(3) { animation-delay: .3s; }
        @keyframes typingPulse {
            0%, 60%, 100% { transform: scale(.6); opacity:.4; }
            30%           { transform: scale(1);  opacity:1;  }
        }
        .read-check { color:#cbd5e1; }
        .read-check.read { color:#60a5fa; }
        .msg-bubble-mine + p .read-check { color: rgba(255,255,255,.6); }
        .msg-bubble-mine + p .read-check.read { color:#bfdbfe; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-neutral-100 text-slate-900">

<!-- ══════════════ HEADER ══════════════ -->
<header></header>

<!-- ══════════════ MAIN ══════════════ -->
<main class="flex-grow max-w-6xl mx-auto w-full px-4 py-6">

    <!-- Not logged in -->
    <div id="notLoggedIn" class="hidden text-center py-24">
        <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-lock text-blue-400 text-2xl"></i>
        </div>
        <h2 class="text-2xl font-black mb-2">Accedi per vedere i messaggi</h2>
        <button onclick="openAuthModal('login')" class="mt-4 bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">
            Accedi
        </button>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="text-center py-24">
        <i class="fas fa-spinner fa-spin text-blue-300 text-4xl"></i>
    </div>

    <!-- Chat layout -->
    <div id="chatLayout" class="hidden h-[calc(100dvh-140px)] gap-4">

        <!-- ── Left: conversation list ── -->
        <div id="convPanel" class="w-full md:w-80 md:flex-shrink-0 bg-white rounded-2xl border border-slate-100 flex flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-100">
                <h2 class="font-black text-base">Conversazioni</h2>
            </div>
            <div id="convList" class="flex-grow overflow-y-auto divide-y divide-slate-50">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- ── Right: chat window ── -->
        <div id="chatPanel" class="hidden flex-grow bg-white rounded-2xl border border-slate-100 flex-col overflow-hidden">

            <!-- Chat header (empty state) -->
            <div id="chatEmpty" class="flex-grow flex flex-col items-center justify-center text-slate-300">
                <i class="fas fa-comment-alt text-6xl mb-4"></i>
                <p class="font-bold text-slate-400">Seleziona una conversazione</p>
            </div>

            <!-- Chat header (active) -->
            <div id="chatHeader" class="hidden border-b border-slate-100">
                <div class="p-3 flex items-center gap-3">
                    <button onclick="backToConversations()" class="md:hidden text-slate-400 hover:text-slate-900 transition flex-shrink-0 w-8 h-8 flex items-center justify-center">
                        <i class="fas fa-arrow-left text-sm"></i>
                    </button>
                    <a id="chatHeaderLink" href="#" class="flex items-center gap-3 flex-grow min-w-0 hover:opacity-80 transition group">
                        <div id="chatHeaderThumb" class="chat-thumb w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0 overflow-hidden">
                            <i class="fas fa-image text-slate-300 text-sm"></i>
                        </div>
                        <div class="min-w-0 flex-grow">
                            <p id="chatOtherName" class="font-black text-sm truncate"></p>
                            <p id="chatHeaderMeta" class="text-xs text-slate-500 font-semibold truncate"></p>
                        </div>
                        <i class="fas fa-chevron-right text-xs text-slate-300 group-hover:text-slate-500 transition flex-shrink-0"></i>
                    </a>
                </div>
                <div id="typingIndicator" class="hidden px-4 pb-2 -mt-1 text-[11px] text-slate-400 font-semibold flex items-center gap-2">
                    <span class="typing-dots"><span></span><span></span><span></span></span>
                    <span>sta scrivendo…</span>
                </div>
            </div>

            <!-- Messages area -->
            <div id="messagesContainer" class="hidden flex-grow p-4 space-y-3 overflow-y-auto">
                <!-- Messages injected here -->
            </div>

            <!-- Message input -->
            <div id="chatInputArea" class="hidden p-4 border-t border-slate-100">
                <form onsubmit="sendMessage(event)" class="flex gap-3">
                    <input id="msgInput" type="text" placeholder="Scrivi un messaggio…" autocomplete="off"
                        class="flex-grow border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition">
                    <button type="submit"
                        class="bg-blue-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-blue-700 transition active:scale-95 flex items-center gap-2">
                        <i class="fas fa-paper-plane"></i>
                        <span class="hidden sm:inline">Invia</span>
                    </button>
                </form>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/page-view-tracker.js?v=1"></script>
<script src="js/ui-components.js?v=2"></script>
<script src="js/auth.js?v=11"></script>
<script>

let _currentUser     = null;
let _conversations   = [];
let _activeConvId    = null;
let _realtimeChannel = null;
let _renderedMsgIds  = new Set();
let _pollInterval    = null;
let _typingTimeout   = null;
let _lastTypingSent  = 0;
let _draftAnnuncio   = null;  // { id, titolo, img_urls, prezzo, comune, tipo, venditore_id } — bozza pre-prima-msg
let _draftSupport    = false; // true → la prossima sendMessage crea una conv supporto
let _adminUserId     = null;
let _isAdmin         = false;

const SUPPORT_DRAFT_ID  = '__support_draft__';
const SUPPORT_TITLE     = 'Supporto Subingresso';
const SUPPORT_SUBTITLE  = 'Ti rispondiamo entro 24 ore';
const SUPPORT_INTRO     = 'Ciao! Raccontaci come possiamo aiutarti — siamo qui per qualunque domanda o problema.';
const SUPPORT_LIST_PREVIEW = 'Hai bisogno di aiuto? Scrivici qui.';

const _profilesCache = {};   // id → { nome, cognome, avatar_url }
const _annunciCache  = {};   // id → { titolo, img_urls, prezzo, comune, tipo }

function _isSupport(c) { return !!(c && (c.is_support || c.id === SUPPORT_DRAFT_ID)); }
function _supportAvatarHTML(size = 40) {
    const dim = size === 40 ? 'w-10 h-10' : 'w-11 h-11';
    return `<div class="${dim} rounded-full flex items-center justify-center flex-shrink-0 bg-gradient-to-br from-blue-500 to-blue-700 text-white">
        <i class="fas fa-life-ring text-sm"></i>
    </div>`;
}
function _supportThumbHTML() {
    return `<div class="w-full h-full bg-gradient-to-br from-blue-500 to-blue-700 text-white flex items-center justify-center">
        <i class="fas fa-life-ring text-base"></i>
    </div>`;
}

function _fmtPrice(prezzo, tipo) {
    if (prezzo == null) return '';
    const n = '€ ' + Number(prezzo).toLocaleString('it-IT');
    return (tipo === 'affitto') ? `${n} /anno` : n;
}
function _otherUserOf(c) {
    return c.acquirente_id === _currentUser.id ? c.venditore_id : c.acquirente_id;
}
function _displayName(p) {
    if (!p) return 'Utente';
    return `${p.nome || ''} ${p.cognome || ''}`.trim() || 'Utente';
}
function _avatarHTML(profile, size = 40) {
    const initial = (profile?.nome || '?').charAt(0).toUpperCase();
    const cls = `w-${size === 40 ? '10' : '11'} h-${size === 40 ? '10' : '11'} rounded-full overflow-hidden flex items-center justify-center flex-shrink-0`;
    if (profile?.avatar_url) {
        return `<div class="${cls} bg-slate-100">
            <img src="${escapeHtml(profile.avatar_url)}" alt="" loading="lazy" decoding="async"
                 style="width:100%;height:100%;object-fit:cover;display:block"
                 onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full bg-blue-600 text-white flex items-center justify-center text-sm font-black\\'>${initial}</div>'">
        </div>`;
    }
    return `<div class="${cls} bg-blue-600 text-white text-sm font-black">${initial}</div>`;
}
function _thumbHTML(annuncio) {
    const url = annuncio?.img_urls?.[0];
    if (url) {
        return `<img src="${escapeHtml(url)}" alt="" loading="lazy" decoding="async"
                     onerror="this.style.display='none'">`;
    }
    return `<i class="fas fa-image text-slate-300 text-sm"></i>`;
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const { data: { user } } = await _supabase.auth.getUser();
        document.getElementById('loadingState').classList.add('hidden');

        if (!user) {
            document.getElementById('notLoggedIn').classList.remove('hidden');
            return;
        }

        _currentUser = user;

        // Admin ID per chat supporto
        try {
            const { data: adminId } = await _supabase.rpc('support_admin_id');
            if (adminId) {
                _adminUserId = adminId;
                _isAdmin = adminId === user.id;
            }
        } catch (_) { /* RPC non disponibile? supporto disattivato */ }

        const layout = document.getElementById('chatLayout');
        layout.classList.remove('hidden');
        layout.classList.add('flex');
        if (window.innerWidth >= 768) {
            document.getElementById('chatPanel').classList.remove('hidden');
            document.getElementById('chatPanel').classList.add('flex');
        }

        await loadConversations();

        const msgInputEl = document.getElementById('msgInput');
        if (msgInputEl) msgInputEl.addEventListener('input', _emitTyping);

        const params = new URLSearchParams(location.search);
        const convParam = params.get('conv');
        const annuncioParam = params.get('annuncio');
        if (convParam) {
            openConversation(convParam);
        } else if (annuncioParam) {
            openDraftFor(annuncioParam);
        }
    } catch (err) {
        document.getElementById('loadingState').innerHTML = `
            <div class="text-center py-24">
                <i class="fas fa-wifi text-slate-300 text-5xl mb-4"></i>
                <p class="font-black text-slate-700 mb-2">Errore di connessione</p>
                <p class="text-slate-400 text-sm mb-6">Verifica la connessione internet e riprova.</p>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition">
                    Ricarica la pagina
                </button>
            </div>`;
    }
});

// ── Load conversation list ───────────────────────────────
async function loadConversations() {
    const { data: convs, error } = await _supabase
        .from('conversazioni')
        .select('id, created_at, acquirente_id, venditore_id, is_support, annuncio:annunci(id, titolo, img_urls, prezzo, comune, tipo)')
        .or(`acquirente_id.eq.${_currentUser.id},venditore_id.eq.${_currentUser.id}`)
        .order('created_at', { ascending: false });

    if (error) console.error('loadConversazioni error:', error.message);

    const list = convs || [];
    if (!list.length) { _conversations = []; renderConvList(); return; }

    // Profili separati (join profiles rompe PostgREST)
    const userIds = [...new Set(list.flatMap(c => [c.acquirente_id, c.venditore_id]))];
    const { data: profiles } = await _supabase
        .from('profiles').select('id, nome, cognome, avatar_url').in('id', userIds);

    const pm = {};
    (profiles || []).forEach(p => { pm[p.id] = p; _profilesCache[p.id] = p; });
    list.forEach(c => { if (c.annuncio?.id) _annunciCache[c.annuncio.id] = c.annuncio; });

    // Ultimo messaggio per ogni conversazione
    const convIds = list.map(c => c.id);
    const { data: allMsgs } = await _supabase
        .from('messaggi')
        .select('id, conversazione_id, testo, created_at, mittente_id, letto')
        .in('conversazione_id', convIds)
        .order('created_at', { ascending: false });

    const lastMsgMap = {};
    (allMsgs || []).forEach(m => {
        if (!lastMsgMap[m.conversazione_id]) lastMsgMap[m.conversazione_id] = m;
    });

    _conversations = list.map(c => ({
        ...c,
        acquirente:  pm[c.acquirente_id] || null,
        venditore:   pm[c.venditore_id]  || null,
        lastMessage: lastMsgMap[c.id]    || null,
    })).filter(c => c.lastMessage || c.is_support)  // conv supporto sempre, altre solo se hanno msg
      .sort((a, b) => {
        const ta = a.lastMessage ? new Date(a.lastMessage.created_at) : new Date(a.created_at);
        const tb = b.lastMessage ? new Date(b.lastMessage.created_at) : new Date(b.created_at);
        return tb - ta;
    });

    // Inietta pseudo-conv supporto se l'utente non è admin e non ne ha una reale
    if (!_isAdmin && _adminUserId) {
        const hasSupportConv = _conversations.some(c => c.is_support && c.acquirente_id === _currentUser.id);
        if (!hasSupportConv) {
            _conversations.unshift({
                id: SUPPORT_DRAFT_ID,
                is_support: true,
                acquirente_id: _currentUser.id,
                venditore_id:  _adminUserId,
                annuncio: null,
                acquirente: null,
                venditore: null,
                lastMessage: null,
                created_at: new Date().toISOString(),
            });
        }
    }

    renderConvList();
}

function renderConvList() {
    const list = document.getElementById('convList');
    if (_conversations.length === 0) {
        list.innerHTML = `<div class="p-6 text-center text-slate-400 text-sm font-semibold">Nessuna conversazione.</div>`;
        return;
    }
    list.innerHTML = _conversations.map(c => {
        const active  = c.id === _activeConvId;
        const lm = c.lastMessage;
        const isUnread = lm && lm.mittente_id !== _currentUser.id && !lm.letto && c.id !== _activeConvId;

        // Riga "Supporto" lato utente (non admin)
        if (_isSupport(c) && !_isAdmin) {
            let preview = SUPPORT_LIST_PREVIEW;
            if (lm) {
                const prefix = lm.mittente_id === _currentUser.id ? 'Tu: ' : '';
                preview = escapeHtml(prefix + lm.testo).slice(0, 55) + (lm.testo.length > 55 ? '…' : '');
            }
            return `
            <button onclick="openConversation('${c.id}')"
                class="w-full text-left px-4 py-3.5 hover:bg-blue-50 transition flex items-center gap-3 ${active ? 'bg-blue-50 border-r-2 border-blue-600' : ''}">
                <div class="relative flex-shrink-0">
                    ${_supportAvatarHTML(40)}
                    ${isUnread ? '<span class="absolute -top-0.5 -right-0.5 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>' : ''}
                </div>
                <div class="flex-grow min-w-0">
                    <div class="flex items-center justify-between gap-2">
                        <p class="text-sm truncate font-black text-slate-900 flex items-center gap-1.5">
                            ${escapeHtml(SUPPORT_TITLE)}
                            <i class="fas fa-circle-check text-blue-500 text-[11px]"></i>
                        </p>
                        ${lm ? `<p class="text-[10px] text-slate-400 font-semibold flex-shrink-0">${new Date(lm.created_at).toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit' })}</p>` : ''}
                    </div>
                    <p class="text-[11px] text-blue-500 font-semibold truncate">Team Subingresso</p>
                    <p class="text-xs truncate mt-0.5 ${isUnread ? 'font-bold text-slate-700' : 'font-medium text-slate-400'}">${preview}</p>
                </div>
            </button>`;
        }

        // Conv normale (e, lato admin, anche le conv supporto come conv normali col badge)
        const otherId = _otherUserOf(c);
        const otherProfile = _profilesCache[otherId] || null;
        const otherName = _displayName(otherProfile);
        const titolo = c.is_support
            ? otherName
            : (c.annuncio?.titolo || 'Annuncio');

        let preview = '<span class="italic">Nessun messaggio</span>';
        if (lm) {
            const prefix = lm.mittente_id === _currentUser.id ? 'Tu: ' : '';
            preview = escapeHtml(prefix + lm.testo).slice(0, 55) + (lm.testo.length > 55 ? '…' : '');
        }

        return `
        <button onclick="openConversation('${c.id}')"
            class="w-full text-left px-4 py-3.5 hover:bg-blue-50 transition flex items-center gap-3 ${active ? 'bg-blue-50 border-r-2 border-blue-600' : ''}">
            <div class="relative flex-shrink-0">
                ${_avatarHTML(otherProfile, 40)}
                ${isUnread ? '<span class="absolute -top-0.5 -right-0.5 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>' : ''}
            </div>
            <div class="flex-grow min-w-0">
                <div class="flex items-center justify-between gap-2">
                    <p class="text-sm truncate font-black text-slate-900 flex items-center gap-1.5">
                        ${escapeHtml(titolo)}
                        ${c.is_support ? '<span class="text-[9px] font-black uppercase tracking-wider bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">Supporto</span>' : ''}
                    </p>
                    ${lm ? `<p class="text-[10px] text-slate-400 font-semibold flex-shrink-0">${new Date(lm.created_at).toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit' })}</p>` : ''}
                </div>
                ${c.is_support
                    ? '<p class="text-[11px] text-blue-500 font-semibold truncate">Richiesta di supporto</p>'
                    : `<p class="text-[11px] text-blue-500 font-semibold truncate">${escapeHtml(otherName)}</p>`}
                <p class="text-xs truncate mt-0.5 ${isUnread ? 'font-bold text-slate-700' : 'font-medium text-slate-400'}">${preview}</p>
            </div>
        </button>`;
    }).join('');
}

// ── Aggiorna preview lista conversazioni ─────────────────
function updateConvLastMessage(convId, msg) {
    const conv = _conversations.find(c => c.id === convId);
    if (conv) {
        conv.lastMessage = msg;
        _conversations.sort((a, b) => {
            const ta = a.lastMessage ? new Date(a.lastMessage.created_at) : new Date(0);
            const tb = b.lastMessage ? new Date(b.lastMessage.created_at) : new Date(0);
            return tb - ta;
        });
        renderConvList();
    }
}

// ── Append singolo messaggio al container ─────────────────
function appendMessage(m) {
    const container = document.getElementById('messagesContainer');
    if (!container) return;

    // Rimuovi placeholder "Inizia la conversazione"
    const placeholder = container.querySelector('[data-placeholder]');
    if (placeholder) placeholder.remove();

    const mine = m.mittente_id === _currentUser.id;
    const time = new Date(m.created_at).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const div  = document.createElement('div');
    div.className = `flex ${mine ? 'justify-end' : 'justify-start'}`;
    div.dataset.msgId = m.id;
    div.innerHTML = `
        <div class="max-w-[75%]">
            <div class="px-4 py-2.5 text-sm font-semibold leading-relaxed ${mine ? 'msg-bubble-mine' : 'msg-bubble-other'}">${escapeHtml(m.testo)}</div>
            <p class="text-[10px] text-slate-400 mt-1 ${mine ? 'text-right' : 'text-left'} font-semibold flex items-center ${mine ? 'justify-end' : 'justify-start'} gap-1.5">
                <span>${time}</span>
                ${mine ? `<i class="fas fa-check${m.letto ? '-double' : ''} read-check ${m.letto ? 'read' : ''} text-[10px]" data-read-mark></i>` : ''}
            </p>
        </div>`;
    container.appendChild(div);
    requestAnimationFrame(() => requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; }));
}

// ── Mobile: torna alla lista ─────────────────────────────
function backToConversations() {
    document.getElementById('convPanel').classList.remove('hidden');
    document.getElementById('convPanel').classList.add('flex');
    document.getElementById('chatPanel').classList.add('hidden');
    document.getElementById('chatPanel').classList.remove('flex');
    _activeConvId  = null;
    _draftAnnuncio = null;
    _draftSupport  = false;
    _hideTyping();
}

// ── Draft: chat aperta con annuncio ma conv non ancora creata ──
// ── Draft Supporto: chat aperta con admin ma conv non ancora creata ──
function _openSupportDraft() {
    if (!_adminUserId) { showToast('Supporto non disponibile.', 'error'); return; }

    _activeConvId  = SUPPORT_DRAFT_ID;
    _draftAnnuncio = null;
    _draftSupport  = true;
    _hideTyping();
    renderConvList();

    document.getElementById('chatEmpty').classList.add('hidden');
    document.getElementById('chatHeader').classList.remove('hidden');
    document.getElementById('messagesContainer').classList.remove('hidden');
    document.getElementById('chatInputArea').classList.remove('hidden');
    if (window.innerWidth < 768) {
        document.getElementById('convPanel').classList.add('hidden');
        document.getElementById('convPanel').classList.remove('flex');
        document.getElementById('chatPanel').classList.remove('hidden');
        document.getElementById('chatPanel').classList.add('flex');
    }

    document.getElementById('chatOtherName').textContent = SUPPORT_TITLE;
    document.getElementById('chatHeaderMeta').textContent = SUPPORT_SUBTITLE;
    document.getElementById('chatHeaderThumb').innerHTML = _supportThumbHTML();
    document.getElementById('chatHeaderLink').href = '#';

    const container = document.getElementById('messagesContainer');
    container.innerHTML = `<div data-placeholder class="text-center text-slate-400 text-sm font-semibold py-12 px-6 max-w-sm mx-auto">
        <div class="w-14 h-14 mx-auto mb-3 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center">
            <i class="fas fa-life-ring text-xl"></i>
        </div>
        <p class="font-black text-slate-700 mb-1">${escapeHtml(SUPPORT_TITLE)}</p>
        <p class="text-slate-500 leading-relaxed">${escapeHtml(SUPPORT_INTRO)}</p>
    </div>`;

    document.getElementById('msgInput')?.focus();
}

async function openDraftFor(annuncioId) {
    const { data: annuncio, error } = await _supabase
        .from('annunci')
        .select('id, titolo, img_urls, prezzo, comune, tipo, user_id, status')
        .eq('id', annuncioId)
        .maybeSingle();

    if (error || !annuncio) {
        showToast('Annuncio non trovato.', 'error');
        return;
    }
    if (annuncio.user_id === _currentUser.id) {
        location.href = 'dashboard.html';
        return;
    }
    if (annuncio.status === 'deleted' || annuncio.status === 'pending') {
        showToast('Questo annuncio non è disponibile per la chat.', 'warning');
        return;
    }

    _annunciCache[annuncio.id] = annuncio;

    // Profilo venditore
    let venditore = _profilesCache[annuncio.user_id];
    if (!venditore) {
        const { data: p } = await _supabase
            .from('profiles').select('id, nome, cognome, avatar_url')
            .eq('id', annuncio.user_id).single();
        if (p) { _profilesCache[p.id] = p; venditore = p; }
    }

    _activeConvId  = null;
    _draftAnnuncio = { ...annuncio, venditore_id: annuncio.user_id };

    // UI: chat panel aperto su mobile e desktop
    document.getElementById('chatEmpty').classList.add('hidden');
    document.getElementById('chatHeader').classList.remove('hidden');
    document.getElementById('messagesContainer').classList.remove('hidden');
    document.getElementById('chatInputArea').classList.remove('hidden');
    if (window.innerWidth < 768) {
        document.getElementById('convPanel').classList.add('hidden');
        document.getElementById('convPanel').classList.remove('flex');
        document.getElementById('chatPanel').classList.remove('hidden');
        document.getElementById('chatPanel').classList.add('flex');
    }

    // Header
    document.getElementById('chatOtherName').textContent = annuncio.titolo || 'Annuncio';
    const meta = [_displayName(venditore), _fmtPrice(annuncio.prezzo, annuncio.tipo)].filter(Boolean).join(' · ');
    document.getElementById('chatHeaderMeta').textContent = meta;
    document.getElementById('chatHeaderThumb').innerHTML = _thumbHTML(annuncio);
    document.getElementById('chatHeaderLink').href = `annuncio.html?id=${annuncio.id}`;

    // Empty state nel container
    const container = document.getElementById('messagesContainer');
    container.innerHTML = `<div data-placeholder class="text-center text-slate-300 text-sm font-semibold py-12">
        <i class="fas fa-paper-plane text-3xl mb-2 block text-slate-200"></i>
        Scrivi il primo messaggio per iniziare la conversazione.
    </div>`;

    document.getElementById('msgInput')?.focus();
}

// ── Open a conversation ──────────────────────────────────
async function openConversation(convId) {
    if (convId === SUPPORT_DRAFT_ID) {
        _openSupportDraft();
        return;
    }

    _activeConvId = convId;
    _draftSupport = false;
    _hideTyping();
    renderConvList();

    let conv = _conversations.find(c => c.id === convId);

    if (!conv) {
        const { data, error } = await _supabase
            .from('conversazioni')
            .select('id, created_at, acquirente_id, venditore_id, is_support, annuncio:annunci(id, titolo, img_urls, prezzo, comune, tipo)')
            .eq('id', convId)
            .single();
        if (error || !data) {
            console.error('openConversation: accesso negato o non trovata.', error?.message);
            return;
        }
        conv = data;
        const otherId = _otherUserOf(conv);
        if (!_profilesCache[otherId]) {
            const { data: p } = await _supabase.from('profiles')
                .select('id, nome, cognome, avatar_url').eq('id', otherId).single();
            if (p) _profilesCache[p.id] = p;
        }
        if (conv.annuncio?.id) _annunciCache[conv.annuncio.id] = conv.annuncio;
        _conversations.unshift(conv);
        renderConvList();
    }

    const isSupport = conv.is_support;
    const annuncio = conv.annuncio || _annunciCache[conv.annuncio_id] || null;
    const otherId  = _otherUserOf(conv);
    const otherProfile = _profilesCache[otherId] || null;

    let _chatTitolo, _chatMeta, _chatThumbHTML, _chatHref;
    if (isSupport && !_isAdmin) {
        // Lato utente: nasconde l'admin
        _chatTitolo    = SUPPORT_TITLE;
        _chatMeta      = SUPPORT_SUBTITLE;
        _chatThumbHTML = _supportThumbHTML();
        _chatHref      = '#';
    } else if (isSupport && _isAdmin) {
        // Lato admin: vede il nome dell'utente
        _chatTitolo    = _displayName(otherProfile);
        _chatMeta      = 'Richiesta di supporto';
        _chatThumbHTML = _supportThumbHTML();
        _chatHref      = `profilo.html?id=${otherId}`;
    } else {
        _chatTitolo = annuncio?.titolo || 'Annuncio';
        const _chatOther = _displayName(otherProfile);
        const _chatPrice = annuncio ? _fmtPrice(annuncio.prezzo, annuncio.tipo) : '';
        _chatMeta      = [_chatOther, _chatPrice].filter(Boolean).join(' · ');
        _chatThumbHTML = _thumbHTML(annuncio);
        _chatHref      = annuncio?.id ? `annuncio.html?id=${annuncio.id}` : '#';
    }

    document.getElementById('chatEmpty').classList.add('hidden');
    document.getElementById('chatHeader').classList.remove('hidden');
    document.getElementById('messagesContainer').classList.remove('hidden');
    document.getElementById('chatInputArea').classList.remove('hidden');

    if (window.innerWidth < 768) {
        document.getElementById('convPanel').classList.add('hidden');
        document.getElementById('convPanel').classList.remove('flex');
        document.getElementById('chatPanel').classList.remove('hidden');
        document.getElementById('chatPanel').classList.add('flex');
    }

    document.getElementById('chatOtherName').textContent = _chatTitolo;
    document.getElementById('chatHeaderMeta').textContent = _chatMeta;
    document.getElementById('chatHeaderThumb').innerHTML = _chatThumbHTML;
    document.getElementById('chatHeaderLink').href = _chatHref;

    await loadMessages(convId);
    setupRealtime(convId);

    setTimeout(() => {
        const c = document.getElementById('messagesContainer');
        if (c) c.scrollTop = c.scrollHeight;
    }, 80);

    await _supabase
        .from('messaggi').update({ letto: true })
        .eq('conversazione_id', convId).neq('mittente_id', _currentUser.id);

    updateAuthNav();
}

// ── Load messages (full reload, popola _renderedMsgIds) ──
async function loadMessages(convId) {
    _renderedMsgIds.clear();
    const { data } = await _supabase
        .from('messaggi')
        .select('id, conversazione_id, mittente_id, testo, created_at, letto')
        .eq('conversazione_id', convId)
        .order('created_at', { ascending: true });

    const msgs = data || [];
    msgs.forEach(m => _renderedMsgIds.add(m.id));
    renderMessages(msgs);
}

function renderMessages(msgs) {
    const container = document.getElementById('messagesContainer');
    if (msgs.length === 0) {
        container.innerHTML = `<div data-placeholder class="text-center text-slate-300 text-sm font-semibold py-8">
            <i class="fas fa-comment-alt text-3xl mb-2 block"></i>
            Inizia la conversazione!
        </div>`;
        return;
    }
    container.innerHTML = msgs.map(m => {
        const mine = m.mittente_id === _currentUser.id;
        const time = new Date(m.created_at).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        return `
        <div class="flex ${mine ? 'justify-end' : 'justify-start'}" data-msg-id="${m.id}">
            <div class="max-w-[75%]">
                <div class="px-4 py-2.5 text-sm font-semibold leading-relaxed ${mine ? 'msg-bubble-mine' : 'msg-bubble-other'}">${escapeHtml(m.testo)}</div>
                <p class="text-[10px] text-slate-400 mt-1 ${mine ? 'text-right' : 'text-left'} font-semibold flex items-center ${mine ? 'justify-end' : 'justify-start'} gap-1.5">
                    <span>${time}</span>
                    ${mine ? `<i class="fas fa-check${m.letto ? '-double' : ''} read-check ${m.letto ? 'read' : ''} text-[10px]" data-read-mark></i>` : ''}
                </p>
            </div>
        </div>`;
    }).join('');
    requestAnimationFrame(() => requestAnimationFrame(() => {
        const c = document.getElementById('messagesContainer');
        if (c) c.scrollTop = c.scrollHeight;
    }));
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Send message ─────────────────────────────────────────
async function sendMessage(e) {
    e.preventDefault();
    const input = document.getElementById('msgInput');
    const testo = input.value.trim();
    if (!testo) return;
    const inDraft = _draftAnnuncio || _draftSupport;
    if (!_activeConvId && !inDraft) return;
    if (_draftSupport && !_adminUserId) return;

    const btn = e.target.querySelector('button[type=submit]');
    input.value = '';
    if (btn) btn.disabled = true;

    // Draft supporto: crea conv is_support=true al primo messaggio
    if (_draftSupport) {
        const { data: existing } = await _supabase
            .from('conversazioni')
            .select('id, created_at, acquirente_id, venditore_id, is_support')
            .eq('acquirente_id', _currentUser.id)
            .eq('is_support', true)
            .maybeSingle();

        let convId = existing?.id;
        let convRow = existing;
        if (!convId) {
            const { data: created, error: convErr } = await _supabase
                .from('conversazioni')
                .insert({
                    annuncio_id:   null,
                    acquirente_id: _currentUser.id,
                    venditore_id:  _adminUserId,
                    is_support:    true,
                })
                .select('id, created_at, acquirente_id, venditore_id, is_support')
                .single();
            if (convErr) {
                if (btn) btn.disabled = false;
                input.value = testo;
                console.error('create support conv error:', convErr.message);
                showToast('Errore nella chat di supporto. Riprova.', 'error');
                return;
            }
            convId  = created.id;
            convRow = created;
        }

        // Promuovi in lista (sostituisci pseudo-conv draft)
        _conversations = _conversations.filter(c => c.id !== SUPPORT_DRAFT_ID);
        _conversations.unshift({
            ...convRow,
            annuncio: null,
            acquirente: _profilesCache[_currentUser.id] || null,
            venditore:  _profilesCache[_adminUserId] || null,
            lastMessage: null,
        });

        _activeConvId = convId;
        _draftSupport = false;
        document.querySelector('#messagesContainer [data-placeholder]')?.remove();
        setupRealtime(convId);
    }

    // Se siamo in draft mode (annuncio), crea la conv adesso (al primo messaggio)
    if (!_activeConvId && _draftAnnuncio) {
        // Race-protection: ricontrolla se nel frattempo esiste già
        const { data: existing } = await _supabase
            .from('conversazioni')
            .select('id')
            .eq('annuncio_id', _draftAnnuncio.id)
            .eq('acquirente_id', _currentUser.id)
            .maybeSingle();

        let convId = existing?.id;
        if (!convId) {
            const { data: created, error: convErr } = await _supabase
                .from('conversazioni')
                .insert({
                    annuncio_id:   _draftAnnuncio.id,
                    acquirente_id: _currentUser.id,
                    venditore_id:  _draftAnnuncio.venditore_id,
                })
                .select('id, created_at, acquirente_id, venditore_id')
                .single();
            if (convErr) {
                if (btn) btn.disabled = false;
                input.value = testo;
                console.error('create conv error:', convErr.message);
                showToast('Errore nella chat. Riprova.', 'error');
                return;
            }
            convId = created.id;
            _conversations.unshift({
                ...created,
                annuncio: _draftAnnuncio,
                acquirente: _profilesCache[_currentUser.id] || null,
                venditore:  _profilesCache[_draftAnnuncio.venditore_id] || null,
                lastMessage: null,
            });
        }

        _activeConvId  = convId;
        _draftAnnuncio = null;
        document.querySelector('#messagesContainer [data-placeholder]')?.remove();
        setupRealtime(convId);
    }

    const { data: saved, error } = await _supabase
        .from('messaggi')
        .insert({ conversazione_id: _activeConvId, mittente_id: _currentUser.id, testo })
        .select('id, conversazione_id, mittente_id, testo, created_at, letto')
        .single();

    if (btn) btn.disabled = false;

    if (error) {
        input.value = testo; // ripristina su errore
        console.error('sendMessage error:', error.message);
        showToast('Errore invio messaggio. Riprova.', 'error');
        return;
    }

    // Mostra subito senza aspettare realtime; segna come già renderizzato
    if (saved && !_renderedMsgIds.has(saved.id)) {
        _renderedMsgIds.add(saved.id);
        appendMessage(saved);
        updateConvLastMessage(_activeConvId, { ...saved, letto: true });
        renderConvList();  // mostra la conv appena nata nella lista
    }
}

// ── Realtime subscription ────────────────────────────────
function setupRealtime(convId) {
    if (_realtimeChannel) _supabase.removeChannel(_realtimeChannel);

    _realtimeChannel = _supabase
        .channel(`messages-${convId}`, { config: { broadcast: { self: false } } })
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'messaggi',
            filter: `conversazione_id=eq.${convId}`
        }, async (payload) => {
            const msg = payload.new;
            if (!msg || _renderedMsgIds.has(msg.id)) return; // già mostrato (invio ottimistico)

            _renderedMsgIds.add(msg.id);
            appendMessage(msg);
            updateConvLastMessage(convId, msg);
            _hideTyping();

            // Segna come letto se è dell'altro utente
            if (msg.mittente_id !== _currentUser.id) {
                await _supabase.from('messaggi').update({ letto: true })
                    .eq('conversazione_id', convId).neq('mittente_id', _currentUser.id);
            }
            updateAuthNav();
        })
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'messaggi',
            filter: `conversazione_id=eq.${convId}`
        }, (payload) => {
            const msg = payload.new;
            if (!msg || msg.mittente_id !== _currentUser.id || !msg.letto) return;
            const row = document.querySelector(`[data-msg-id="${msg.id}"]`);
            if (!row) return;
            const mark = row.querySelector('[data-read-mark]');
            if (!mark || mark.classList.contains('read')) return;
            mark.classList.remove('fa-check');
            mark.classList.add('fa-check-double', 'read');
        })
        .on('broadcast', { event: 'typing' }, ({ payload }) => {
            if (!payload || payload.u === _currentUser.id) return;
            _showTyping();
            clearTimeout(_typingTimeout);
            _typingTimeout = setTimeout(_hideTyping, 2500);
        })
        .subscribe((status) => {
            if (status === 'SUBSCRIBED') {
                if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }
            } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
                // Realtime non disponibile: polling ogni 15s
                if (!_pollInterval) {
                    _pollInterval = setInterval(() => {
                        if (_activeConvId) _pollNewMessages(_activeConvId);
                    }, 15000);
                }
            }
        });
}

function _showTyping() { document.getElementById('typingIndicator')?.classList.remove('hidden'); }
function _hideTyping() {
    clearTimeout(_typingTimeout);
    document.getElementById('typingIndicator')?.classList.add('hidden');
}
function _emitTyping() {
    if (!_realtimeChannel || !_activeConvId) return;
    const now = Date.now();
    if (now - _lastTypingSent < 1500) return; // throttle
    _lastTypingSent = now;
    _realtimeChannel.send({
        type: 'broadcast',
        event: 'typing',
        payload: { u: _currentUser.id }
    });
}

async function _pollNewMessages(convId) {
    const { data: msgs } = await _supabase
        .from('messaggi')
        .select('id, conversazione_id, mittente_id, testo, created_at, letto')
        .eq('conversazione_id', convId)
        .order('created_at', { ascending: false })
        .limit(10);
    if (!msgs) return;
    msgs.reverse().forEach(msg => {
        if (_renderedMsgIds.has(msg.id)) return;
        _renderedMsgIds.add(msg.id);
        appendMessage(msg);
        updateConvLastMessage(convId, msg);
    });
}
