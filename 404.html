<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina non trovata — Subingresso.it</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/tailwind.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-neutral-100 text-slate-900">

<header class="bg-white border-b border-slate-100 py-5 px-6">
    <a href="/" class="flex items-center gap-3 w-fit">
        <div class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow shadow-blue-100">
            <i class="fas fa-exchange-alt"></i>
        </div>
        <span class="text-xl font-extrabold tracking-tight">Subingresso<span class="text-blue-600">.it</span></span>
    </a>
</header>

<main class="flex-grow flex items-center justify-center px-6 py-20">
    <div class="text-center max-w-md">
        <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-store text-blue-300 text-3xl"></i>
        </div>
        <h1 class="text-7xl font-black text-blue-600 mb-2">404</h1>
        <h2 class="text-2xl font-black text-slate-900 mb-3">Pagina non trovata</h2>
        <p class="text-slate-500 font-medium leading-relaxed mb-8">
            Il posteggio che cerchi non esiste o è stato rimosso. Torna alla home o sfoglia gli annunci.
        </p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/"
               class="bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-black hover:bg-blue-700 transition text-sm">
                <i class="fas fa-home mr-2"></i>Torna alla home
            </a>
            <a href="/annunci"
               class="bg-white border border-slate-200 text-slate-700 px-8 py-3.5 rounded-2xl font-bold hover:border-blue-200 hover:bg-blue-50 transition text-sm">
                <i class="fas fa-search mr-2"></i>Vedi gli annunci
            </a>
        </div>
    </div>
</main>

<footer class="py-8 text-center text-slate-400 text-xs font-semibold border-t border-slate-100">
    &copy; <span id="year"></span> Subingresso.it
</footer>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
