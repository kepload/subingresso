<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Blog & Guide per Ambulanti — Subingresso.it</title>
    <meta name="description" id="metaBlogDesc" content="Guide tecniche, aggiornamenti normativi e risorse pratiche per ambulanti e titolari di posteggi mercatali.">
    <meta property="og:title" id="ogBlogTitle" content="Blog & Guide per Ambulanti — Subingresso.it">
    <meta property="og:description" id="ogBlogDesc" content="Guide tecniche, aggiornamenti normativi e risorse pratiche per ambulanti e titolari di posteggi mercatali.">
    <meta property="og:type" content="website">
    <meta property="og:url" id="ogBlogUrl" content="https://subingresso.it/blog">
    <meta property="og:image" id="ogBlogImage" content="https://images.pexels.com/photos/1187299/pexels-photo-1187299.jpeg?auto=compress&cs=tinysrgb&w=1200&h=630&fit=crop">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" id="twitterImage" content="https://images.pexels.com/photos/1187299/pexels-photo-1187299.jpeg?auto=compress&cs=tinysrgb&w=1200&h=630&fit=crop">
    <link rel="canonical" id="canonicalBlog" href="https://subingresso.it/blog">
    <link rel="preconnect" href="https://images.pexels.com" crossorigin>
    <link rel="stylesheet" href="css/tailwind.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .prose p { margin-bottom: 1.5rem; color: #475569; line-height: 1.8; }
        .prose h2 { font-weight: 800; font-size: 1.5rem; margin-top: 2.5rem; margin-bottom: 1rem; color: #0f172a; }
        .prose strong { color: #1e293b; }
        .prose ul, .prose ol { margin-bottom: 1.5rem; }
        .prose table { width: 100%; border-collapse: collapse; margin: 2rem 0; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .prose th { background: #f8fafc; text-align: left; padding: 12px; border: 1px solid #e2e8f0; font-size: 0.875rem; color: #1e293b; white-space: nowrap; }
        .prose td { padding: 12px; border: 1px solid #e2e8f0; font-size: 0.875rem; color: #475569; }
        
        .cta-button {
            display: inline-flex; align-items: center; gap: 12px;
            background: #2563eb; color: white; font-weight: 800;
            padding: 16px 28px; border-radius: 18px;
            box-shadow: 0 10px 20px -5px rgba(37,99,235,0.3);
            transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 0.02em; font-size: 0.8rem;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(37,99,235,0.4);
            background: #1d4ed8;
        }
    </style>
</head>
<body class="bg-neutral-100 text-slate-900">

<header></header>

<main class="max-w-3xl mx-auto px-6 pt-8 pb-16">
    <!-- Banner Calcolatore -->
    <div class="mb-10 px-5 py-3 bg-gradient-to-r from-blue-600 to-violet-700 rounded-2xl flex items-center justify-between gap-4">
        <span class="text-white font-bold text-sm">Quanto vale il tuo posteggio?</span>
        <a href="/valutatore" class="shrink-0 bg-white text-blue-600 font-black px-4 py-2 rounded-xl text-xs hover:bg-blue-50 transition whitespace-nowrap">
            Calcola <i class="fas fa-arrow-right ml-1"></i>
        </a>
    </div>

    <div id="loading" class="text-center py-20">
        <i class="fas fa-spinner fa-spin text-blue-600 text-3xl"></i>
    </div>
    <div id="blogContainer" class="hidden"></div>
</main>

<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/page-view-tracker.js?v=1"></script>
<script src="js/data.js?v=15"></script>
<script src="js/ui-components.js?v=11"></script>
<script src="js/auth.js?v=12"></script>
<script>
const params = new URLSearchParams(location.search);
const slug = params.get('post');
const container = document.getElementById('blogContainer');
const loading = document.getElementById('loading');

async function loadBlog() {
    try {
        const { data: posts, error } = await _supabase
            .from('blog_posts')
            .select('*')
            .order('published_at', { ascending: false });

        if (error) throw error;

        loading.classList.add('hidden');
        container.classList.remove('hidden');

        if (slug) {
            const post = posts.find(p => p.slug === slug);
            if (post) {
                renderPost(post);
            } else {
                container.innerHTML = `<div class="text-center">Post non trovato. <a href="/blog" class="text-blue-600 underline">Torna all'indice</a></div>`;
            }
        } else {
            renderList(posts);
        }
    } catch (err) {
        console.error(err);
        loading.innerHTML = `<p class="text-red-500">Errore nel caricamento del blog. Verifica la connessione.</p>`;
    }
}

function _insertBlogPromo(html) {
    // Inietta dopo il 3° paragrafo. Se l'articolo è troppo corto non inserisce nulla.
    let count = 0, splitAt = -1, idx = 0;
    while (idx < html.length) {
        const found = html.indexOf('</p>', idx);
        if (found === -1) break;
        idx = found + 4;
        if (++count === 3) { splitAt = idx; break; }
    }
    if (splitAt === -1) return html;
    const promo = `<div class="blog-promo not-prose my-8 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-slate-600">
        🎰 Nuovo su Subingresso? <a href="#" onclick="sessionStorage.setItem('_reg_src','popup'); openAuthModal('register'); return false;" class="font-bold text-amber-700 hover:underline">Registrati e prova a vincere 30 giorni di Vetrina gratis →</a>
    </div>`;
    return html.slice(0, splitAt) + promo + html.slice(splitAt);
}

// Helper: builds Pexels CDN URL with on-the-fly resize (auto WebP/AVIF, lossy compression).
// Saves bandwidth: a 1200x675 hero is ~80-150KB instead of the full 4MB original.
function _pexelsUrl(base, w, h) {
    if (!base) return '';
    const sep = base.includes('?') ? '&' : '?';
    return base + sep + 'auto=compress&cs=tinysrgb&w=' + w + (h ? '&h=' + h : '') + '&fit=crop';
}

function renderPost(post) {
    const date = new Date(post.published_at).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
    const safeTitle = escapeHTML(post.title);
    const safeContent = DOMPurify.sanitize(post.content);

    // Aggiorna meta tag dinamicamente per ogni post
    document.title = `${post.title} — Subingresso.it`;
    const _sm = (id, val) => { const el = document.getElementById(id); if (el && val) el.setAttribute('content', val); };
    const _desc = post.excerpt || post.title;
    _sm('metaBlogDesc', _desc);
    _sm('ogBlogTitle',  `${post.title} — Subingresso.it`);
    _sm('ogBlogDesc',   _desc);
    const postUrl = `https://subingresso.it/blog?post=${encodeURIComponent(post.slug)}`;
    _sm('ogBlogUrl', postUrl);
    const canon = document.getElementById('canonicalBlog');
    if (canon) canon.href = postUrl;

    // og:image dinamico (1200x630 = standard OG / Discover). Fallback su una foto generica se l'articolo non ha cover (per non rompere lo share sui social).
    const cover = post.cover_image_url || '';
    const ogBase = cover || 'https://images.pexels.com/photos/1187299/pexels-photo-1187299.jpeg';
    const ogImage = _pexelsUrl(ogBase, 1200, 630);
    _sm('ogBlogImage', ogImage);
    _sm('twitterImage', ogImage);

    // JSON-LD NewsArticle (preferito da Google Discover) con image array a 3 aspect ratios.
    const _ld = {
        "@context": "https://schema.org",
        "@type": "NewsArticle",
        "headline": post.title,
        "description": _desc,
        "datePublished": post.published_at,
        "dateModified": post.published_at,
        "url": postUrl,
        "inLanguage": "it-IT",
        "author":    { "@type": "Organization", "name": post.author || "Redazione Subingresso", "url": "https://subingresso.it" },
        "publisher": { "@type": "Organization", "name": "Subingresso.it", "url": "https://subingresso.it" }
    };
    // NewsArticle richiede image. Discover predilige 3 aspect ratios: 16:9, 4:3, 1:1. Sempre populato (anche fallback).
    _ld.image = [
        _pexelsUrl(ogBase, 1200, 675),
        _pexelsUrl(ogBase, 1200, 900),
        _pexelsUrl(ogBase, 1200, 1200),
    ];
    let _ldEl = document.getElementById('_ldBlog');
    if (!_ldEl) { _ldEl = document.createElement('script'); _ldEl.id = '_ldBlog'; _ldEl.type = 'application/ld+json'; document.head.appendChild(_ldEl); }
    _ldEl.textContent = JSON.stringify(_ld);

    // Hero image markup. Eager + fetchpriority=high perché è above the fold.
    const heroHtml = cover ? `
        <img src="${escapeHTML(_pexelsUrl(cover, 1200, 675))}"
             srcset="${escapeHTML(_pexelsUrl(cover, 600, 338))} 600w, ${escapeHTML(_pexelsUrl(cover, 900, 506))} 900w, ${escapeHTML(_pexelsUrl(cover, 1200, 675))} 1200w, ${escapeHTML(_pexelsUrl(cover, 1600, 900))} 1600w"
             sizes="(max-width: 768px) 100vw, 768px"
             alt="${safeTitle}"
             loading="eager" fetchpriority="high" decoding="async"
             class="w-full aspect-[16/9] object-cover rounded-3xl mb-8 bg-slate-100">
    ` : '';

    container.innerHTML = `
        ${heroHtml}
        <p class="text-blue-600 font-bold text-xs uppercase tracking-widest mb-4 text-left">${date}</p>
        <h1 class="text-4xl font-black tracking-tight text-slate-900 mb-10 leading-tight text-left">${safeTitle}</h1>
        <div class="prose font-medium text-left">${_insertBlogPromo(safeContent)}</div>
        <div class="mt-20 p-10 bg-slate-50 rounded-[40px] border border-slate-100 text-center">
            <div class="bg-blue-600 text-white w-16 h-16 rounded-3xl flex items-center justify-center shadow-lg shadow-blue-100 mx-auto mb-6 text-center">
                <i class="fas fa-rocket text-2xl"></i>
            </div>
            <h3 class="text-2xl font-black tracking-tight mb-4 text-slate-900 text-center">Passa all'azione oggi stesso</h3>
            <p class="text-slate-500 font-medium mb-8 max-w-md mx-auto italic text-sm text-center">Subingresso.it è il partner tecnico che ti accompagna nella compravendita del tuo posteggio.</p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a href="/vendi" class="bg-blue-600 text-white font-black px-10 py-5 rounded-2xl hover:bg-blue-700 transition shadow-xl shadow-blue-100 text-center">Voglio Vendere</a>
                <a href="/annunci" class="bg-white text-slate-900 border border-slate-200 font-black px-10 py-5 rounded-2xl hover:bg-slate-50 transition shadow-sm text-center">Voglio Comprare</a>
            </div>
        </div>
        <div class="mt-12 pt-10 border-t border-slate-100 text-left">
            <a href="/blog" class="text-sm font-bold text-slate-400 hover:text-blue-600 transition">← Torna all'indice degli articoli</a>
        </div>
    `;
    // Nascondi la promo agli utenti già loggati
    _supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) document.querySelectorAll('.blog-promo').forEach(el => el.remove());
    });
}

function renderList(posts) {
    if (posts.length === 0) {
        container.innerHTML = `<h1 class="text-3xl font-black tracking-tight mb-12 text-left">Archivio Tecnico & Guide</h1><p class="text-slate-400">Nessun articolo presente al momento.</p>`;
        return;
    }
    container.innerHTML = `
        <h1 class="text-3xl font-black tracking-tight mb-12 text-left">Archivio Tecnico & Guide</h1>
        <div class="grid gap-12 text-left">
            ${posts.map(p => {
                const date = new Date(p.published_at).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
                const safeSlug = encodeURIComponent(p.slug);
                const safeTitle = escapeHTML(p.title);
                const safeExcerpt = escapeHTML(p.excerpt || 'Guida tecnica completa con riferimenti normativi e consigli pratici.');
                const cover = p.cover_image_url || '';
                const thumbHtml = cover ? `
                    <img src="${escapeHTML(_pexelsUrl(cover, 600, 338))}"
                         srcset="${escapeHTML(_pexelsUrl(cover, 400, 225))} 400w, ${escapeHTML(_pexelsUrl(cover, 600, 338))} 600w, ${escapeHTML(_pexelsUrl(cover, 900, 506))} 900w"
                         sizes="(max-width: 768px) 100vw, 720px"
                         alt="${safeTitle}"
                         loading="lazy" decoding="async"
                         class="w-full aspect-[16/9] object-cover rounded-2xl mb-4 bg-slate-100">
                ` : '';
                return `
                <a href="/blog?post=${safeSlug}" class="block group border-b border-slate-50 pb-8 last:border-0 text-left">
                    ${thumbHtml}
                    <p class="text-xs font-bold text-slate-400 uppercase mb-2 text-left">${date}</p>
                    <h2 class="text-2xl font-black group-hover:text-blue-600 transition tracking-tight leading-tight text-left">${safeTitle}</h2>
                    <p class="text-slate-500 text-sm mt-3 font-medium leading-relaxed text-left">${safeExcerpt}</p>
                    <p class="text-blue-600 text-xs font-black uppercase tracking-widest mt-4 text-left">Leggi la guida completa →</p>
                </a>
                `;
            }).join('')}
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', loadBlog);
</script>
</body>
</html>
