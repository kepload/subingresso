<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuova password — Subingresso.it</title>
    <meta name="robots" content="noindex">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl w-full max-w-sm shadow-xl p-8">

        <!-- Stato: caricamento -->
        <div id="stateLoading" class="text-center">
            <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-spinner fa-spin text-blue-600 text-xl"></i>
            </div>
            <p class="text-sm font-semibold text-slate-500">Verifica in corso…</p>
        </div>

        <!-- Stato: form nuova password -->
        <div id="stateForm" class="hidden">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-lock text-blue-600 text-xl"></i>
                </div>
                <h1 class="text-xl font-black text-slate-800">Nuova password</h1>
                <p class="text-sm text-slate-400 mt-1">Scegli una password sicura</p>
            </div>

            <div id="resetError" class="hidden mb-4 bg-red-50 border border-red-100 rounded-xl px-4 py-3 flex items-center gap-2">
                <i class="fas fa-exclamation-circle text-red-400"></i>
                <span id="resetErrorMsg" class="text-sm text-red-600 font-semibold"></span>
            </div>

            <form onsubmit="handleResetPassword(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-1.5">Nuova password</label>
                    <div class="relative">
                        <input id="newPassword" type="password" placeholder="Minimo 6 caratteri" required minlength="6"
                            class="w-full border border-slate-200 rounded-xl px-4 py-3 pr-11 text-sm font-semibold outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition">
                        <button type="button" onclick="togglePwdReset()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
                            <i id="toggleIcon" class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="resetBtn"
                    class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-sm hover:bg-blue-700 transition active:scale-[.98] flex items-center justify-center gap-2">
                    <i class="fas fa-check"></i> Salva nuova password
                </button>
            </form>
        </div>

        <!-- Stato: successo -->
        <div id="stateSuccess" class="hidden text-center">
            <div class="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-emerald-600 text-xl"></i>
            </div>
            <h2 class="text-xl font-black text-slate-800 mb-2">Password aggiornata!</h2>
            <p class="text-sm text-slate-400 mb-6">Ora puoi accedere con la nuova password.</p>
            <a href="index.html" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-black text-sm hover:bg-blue-700 transition block text-center">
                Vai alla home
            </a>
        </div>

        <!-- Stato: link scaduto -->
        <div id="stateExpired" class="hidden text-center">
            <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-times text-red-500 text-xl"></i>
            </div>
            <h2 class="text-xl font-black text-slate-800 mb-2">Link scaduto</h2>
            <p class="text-sm text-slate-400 mb-6">Il link non è più valido. Richiedine uno nuovo.</p>
            <a href="index.html" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-black text-sm hover:bg-blue-700 transition block text-center">
                Torna alla home
            </a>
        </div>

    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        function show(id) {
            ['stateLoading','stateForm','stateSuccess','stateExpired'].forEach(s => {
                document.getElementById(s).classList.toggle('hidden', s !== id);
            });
        }

        // Supabase manda il token come hash fragment o query param
        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                show('stateForm');
            } else if (event === 'SIGNED_IN' && session) {
                // Già loggato ma non è un reset — vai alla home
                // (non fare nulla qui, aspetta PASSWORD_RECOVERY)
            }
        });

        // Timeout: se dopo 5s non è arrivato nessun evento, il link è scaduto
        setTimeout(() => {
            if (!document.getElementById('stateForm').classList.contains('hidden')) return;
            if (!document.getElementById('stateSuccess').classList.contains('hidden')) return;
            show('stateExpired');
        }, 5000);

        async function handleResetPassword(e) {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const pwd = document.getElementById('newPassword').value;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio…';
            const { error } = await _supabase.auth.updateUser({ password: pwd });
            if (error) {
                document.getElementById('resetErrorMsg').textContent = 'Errore. Riprova o richiedi un nuovo link.';
                document.getElementById('resetError').classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> Salva nuova password';
            } else {
                show('stateSuccess');
            }
        }

        function togglePwdReset() {
            const el = document.getElementById('newPassword');
            const icon = document.getElementById('toggleIcon');
            el.type = el.type === 'password' ? 'text' : 'password';
            icon.className = el.type === 'password' ? 'fas fa-eye text-sm' : 'fas fa-eye-slash text-sm';
        }
    </script>
</body>
</html>
