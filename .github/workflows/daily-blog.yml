name: Generatore Blog Quotidiano
on:
  schedule:
    - cron: '0 3 * * *' # Ogni notte alle 03:00
  workflow_dispatch: # Permette di lanciarlo a mano per prova

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installa dipendenze
        run: npm install @google/generative-ai @supabase/supabase-js

      - name: Esegui generatore blog
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/generate-blog-job.js
